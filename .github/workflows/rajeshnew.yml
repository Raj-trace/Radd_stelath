name: Docker Deploy

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t rajesh146/myapp:latest .

      - name: Push Docker image
        run: docker push rajesh146/myapp:latest

      - name: Stop old container
        run: docker stop gallant_dewdney || true

      - name: Remove old container
        run: docker rm gallant_dewdney || true

      - name: Pull latest image
        run: docker pull rajesh146/myapp:latest

      - name: Run new container
        run: |
          docker run -d \
            --name gallant_dewdney \
            -p 9809:80 \
            --restart always \
            rajesh146/myapp:latest