name: Docker Deploy

on:
push:
branches:
- main

jobs:
build-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  # Test root project build
  - name: Test MyApp Build
    run: docker build -t myapp-test .

  # Build MyApp with version number
  - name: Build MyApp Image
    run: |
      docker build -t rajesh146/myapp:${{ github.run_number }} .
      docker tag rajesh146/myapp:${{ github.run_number }} rajesh146/myapp:latest

  # Push MyApp
  - name: Push MyApp Image
    run: |
      docker push rajesh146/myapp:${{ github.run_number }}
      docker push rajesh146/myapp:latest

  # Test Project1 build
  - name: Test Pirates Build
    run: docker build -t pirates-test ./Project1

  # Build Pirates with version number
  - name: Build Pirates Image
    run: |
      docker build -t rajesh146/pirates:${{ github.run_number }} ./Project1
      docker tag rajesh146/pirates:${{ github.run_number }} rajesh146/pirates:latest

  # Push Pirates
  - name: Push Pirates Image
    run: |
      docker push rajesh146/pirates:${{ github.run_number }}
      docker push rajesh146/pirates:latest
```

