<!DOCTYPE html>
<html>
<head>
  <title>Ships Race to the Sun</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to top, #001d3d, #003566);
    }

    /* 🌊 Ocean waves effect */
    .ocean {
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        #0077b6,
        #0077b6 10px,
        #0096c7 10px,
        #0096c7 20px
      );
      opacity: 0.3;
    }

    /* ☀️ Sun */
    .sun {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      background: yellow;
      border-radius: 50%;
      box-shadow: 0 0 40px yellow;
    }

    /* 🚢 Ship */
    .ship {
      position: absolute;
      width: 40px;
      height: 20px;
      background: brown;
      border-radius: 5px;
    }

    .ship::before {
      content: "";
      position: absolute;
      left: 18px;
      top: -20px;
      width: 4px;
      height: 20px;
      background: white;
    }

    .ship::after {
      content: "";
      position: absolute;
      left: 22px;
      top: -20px;
      width: 20px;
      height: 15px;
      background: rgba(255,255,255,0.9);
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }
  </style>
</head>

<body>

<div class="ocean"></div>
<div class="sun"></div>

<script>
  const sun = { x: window.innerWidth / 2, y: 100 };

  const ships = [];

  // 🚢 Create multiple ships
  for (let i = 0; i < 6; i++) {
    const ship = document.createElement("div");
    ship.className = "ship";
    document.body.appendChild(ship);

    ships.push({
      el: ship,
      x: Math.random() * window.innerWidth,
      y: window.innerHeight - 100 - Math.random() * 100,
      speed: 1 + Math.random() * 2
    });
  }

  // 🎯 Move ships toward the sun
  function animate() {
    ships.forEach(s => {
      const dx = sun.x - s.x;
      const dy = sun.y - s.y;

      const dist = Math.sqrt(dx * dx + dy * dy);

      // normalize direction
      s.x += (dx / dist) * s.speed;
      s.y += (dy / dist) * s.speed;

      s.el.style.left = s.x + "px";
      s.el.style.top = s.y + "px";
    });

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
