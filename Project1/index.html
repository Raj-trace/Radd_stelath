<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pirate Sun Race</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    height: 100%;
}

#map {
    width: 100%;
    height: 100vh;
}

.ship {
    font-size: 28px;
}

.winner {
    font-size: 32px;
}

.sun {
    font-size: 40px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ==========================
// MAP
// ==========================
const map = L.map('map').setView([20, 0], 2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ==========================
// SUN
// ==========================
let sun = {
    lat: 10,
    lng: 160
};

const sunMarker = L.marker(
[sun.lat, sun.lng],
{
    icon: L.divIcon({
        html: '<div class="sun">☀️</div>',
        className: '',
        iconSize: [40,40]
    })
}
).addTo(map);

// ==========================
// PIRATE NAMES
// ==========================
const pirateNames = [
"Black Pearl",
"Crimson Kraken",
"Sea Reaper",
"Golden Marauder",
"Shadow Corsair",
"Storm Phantom",
"Dark Buccaneer",
"Ocean Fury",
"Iron Cutlass",
"Ghost Tide"
];

// ==========================
// START LINE
// ==========================
const startLat = -40;
const startLng = -170;

let raceFinished = false;

// ==========================
// CREATE SHIPS
// ==========================
const ships = pirateNames.map((name,index)=>{

    let ship = {
        name:name,
        lat:startLat + (index*5),
        lng:startLng,
        speed:0.15 + Math.random()*0.08,
        winner:false
    };

    ship.marker = L.marker(
    [ship.lat, ship.lng],
    {
        icon:L.divIcon({
            html:'<div class="ship">🏴‍☠️⛵</div>',
            className:'',
            iconSize:[40,40]
        })
    })
    .addTo(map)
    .bindPopup(name);

    return ship;
});

// ==========================
// DISTANCE
// ==========================
function distance(a,b,c,d){
    return Math.sqrt(
        Math.pow(c-a,2)+
        Math.pow(d-b,2)
    );
}

// ==========================
// RESET RACE
// ==========================
function resetRace(){

    raceFinished = false;

    ships.forEach((ship,index)=>{

        ship.lat = startLat + (index*5);
        ship.lng = startLng;

        ship.winner = false;

        ship.marker.setIcon(
            L.divIcon({
                html:'<div class="ship">🏴‍☠️⛵</div>',
                className:'',
                iconSize:[40,40]
            })
        );

        ship.marker.setLatLng([
            ship.lat,
            ship.lng
        ]);
    });

    sun.lat = -20 + Math.random()*60;
    sun.lng = -150 + Math.random()*300;

    sunMarker.setLatLng([
        sun.lat,
        sun.lng
    ]);
}

// ==========================
// MOVE SHIPS
// ==========================
function moveShips(){

    if(raceFinished) return;

    let winners = 0;

    ships.forEach(ship=>{

        let dx = sun.lng - ship.lng;
        let dy = sun.lat - ship.lat;

        let angle = Math.atan2(dy,dx);

        ship.lng += Math.cos(angle)*ship.speed;
        ship.lat += Math.sin(angle)*ship.speed;

        ship.marker.setLatLng([
            ship.lat,
            ship.lng
        ]);

        let dist = distance(
            ship.lat,
            ship.lng,
            sun.lat,
            sun.lng
        );

        if(dist < 2){

            ship.winner = true;

            ship.marker.setIcon(
                L.divIcon({
                    html:'<div class="winner">🚩🏴‍☠️</div>',
                    className:'',
                    iconSize:[50,50]
                })
            );
        }

        if(ship.winner){
            winners++;
        }
    });

    if(winners === ships.length){

        raceFinished = true;

        setTimeout(()=>{
            resetRace();
        },5000);
    }
}

// ==========================
// MOVE SUN
// ==========================
function moveSun(){

    sun.lng += 0.05;

    if(sun.lng > 180){
        sun.lng = -180;
    }

    sunMarker.setLatLng([
        sun.lat,
        sun.lng
    ]);
}

// ==========================
// START
// ==========================
setInterval(moveShips,100);
setInterval(moveSun,1000);

</script>

</body>
</html>
```
